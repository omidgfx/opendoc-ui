<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="320" viewBox="0 0 1100 320" role="img" aria-labelledby="title desc">
  <title id="title">OpenDoc UI logo refined</title>
  <desc id="desc">A refined, minimal OpenDoc UI logo with a rounded gradient mark, a clean document panel, subtle API braces, and a simple wordmark.</desc>
  <defs>
